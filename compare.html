<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>比較分析 - 獨角仙飼養監控系統</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Noto Sans TC", sans-serif; background: #f1f5f9; color: #1e293b; }

    header {
      background: linear-gradient(135deg, #1e3a5f, #2563eb);
      color: white; padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    header h1 { font-size: 1.2rem; }
    .refresh-btn {
      background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
      color: white; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
    }

    nav {
      background: white; padding: 0 24px;
      display: flex; border-bottom: 2px solid #e2e8f0;
    }
    nav a {
      display: block; padding: 12px 20px; text-decoration: none;
      color: #64748b; font-size: 0.9rem; border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    nav a.active { color: #2563eb; border-bottom-color: #2563eb; font-weight: 600; }
    nav a:hover  { color: #2563eb; background: #f8faff; }

    .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

    /* ── 控制列 ── */
    .control-bar {
      background: white; border-radius: 14px; padding: 16px 20px;
      margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .control-row {
      display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin-bottom: 12px;
    }
    .control-row:last-child { margin-bottom: 0; }
    .control-label { font-size: 0.85rem; color: #64748b; font-weight: 600; min-width: 60px; }

    .range-btn, .metric-btn {
      padding: 6px 16px; border-radius: 20px; border: 1px solid #e2e8f0;
      background: white; cursor: pointer; font-size: 0.82rem; color: #64748b;
      transition: all 0.2s;
    }
    .range-btn.active, .metric-btn.active {
      background: #2563eb; color: white; border-color: #2563eb;
    }

    /* ── 組別勾選 ── */
    .group-checks { display: flex; gap: 8px; flex-wrap: wrap; }
    .group-check {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 20px; border: 1px solid #e2e8f0;
      cursor: pointer; font-size: 0.82rem; background: white;
      transition: all 0.2s; user-select: none;
    }
    .group-check.checked { color: white; border-color: transparent; }
    .color-dot { width: 10px; height: 10px; border-radius: 50%; }

    /* ── 排行榜 ── */
    .ranking-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 16px; margin-bottom: 20px;
    }
    @media (max-width: 600px) { .ranking-grid { grid-template-columns: 1fr; } }

    .ranking-card {
      background: white; border-radius: 14px; padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .ranking-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; color: #374151; }
    .rank-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid #f1f5f9;
    }
    .rank-item:last-child { border-bottom: none; }
    .rank-num {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700;
    }
    .rank-1 { background: #fef3c7; color: #d97706; }
    .rank-2 { background: #f1f5f9; color: #64748b; }
    .rank-3 { background: #fef3c7; color: #92400e; }
    .rank-n { background: #f8fafc; color: #94a3b8; }
    .rank-name { flex: 1; font-size: 0.85rem; }
    .rank-value { font-size: 0.9rem; font-weight: 700; }
    .rank-bar-wrap { width: 80px; height: 6px; background: #f1f5f9; border-radius: 3px; }
    .rank-bar { height: 100%; border-radius: 3px; }

    /* ── 圖表 ── */
    .chart-section {
      background: white; border-radius: 14px; padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07); margin-bottom: 16px;
    }
    .chart-title { font-size: 0.95rem; font-weight: 700; color: #374151; margin-bottom: 14px; }
    .chart-wrap  { position: relative; height: 300px; }

    .loading { text-align: center; padding: 60px; color: #94a3b8; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #e2e8f0;
      border-top-color: #2563eb; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>📊 比較分析</h1>
  <button class="refresh-btn" onclick="loadAll()">🔄 重新整理</button>
</header>

<nav>
  <a href="index.html">🏠 總覽</a>
  <a href="compare.html" class="active">📊 比較分析</a>
</nav>

<div class="container">
  <!-- 控制列 -->
  <div class="control-bar">
    <div class="control-row">
      <span class="control-label">指標</span>
      <button class="metric-btn active" onclick="setMetric('temp',this)">🌡️ 空氣溫度</button>
      <button class="metric-btn" onclick="setMetric('humi',this)">💧 空氣濕度</button>
      <button class="metric-btn" onclick="setMetric('soil',this)">🌱 土壤濕度</button>
      <button class="metric-btn" onclick="setMetric('soil_temp',this)">🌡️ 土壤溫度</button>
    </div>
    <div class="control-row">
      <span class="control-label">時間</span>
      <button class="range-btn active" onclick="setRange('today',this)">今天</button>
      <button class="range-btn" onclick="setRange('7days',this)">近7天</button>
      <button class="range-btn" onclick="setRange('30days',this)">近30天</button>
    </div>
    <div class="control-row">
      <span class="control-label">組別</span>
      <div class="group-checks" id="groupChecks"></div>
    </div>
  </div>

  <!-- 排行榜 -->
  <div class="ranking-grid" id="rankingGrid">
    <div class="loading"><div class="spinner"></div>載入中...</div>
  </div>

  <!-- 折線圖 -->
  <div class="chart-section">
    <div class="chart-title" id="chartTitle">📈 各組比較折線圖</div>
    <div class="chart-wrap"><canvas id="compareChart"></canvas></div>
  </div>
</div>

<script src="js/config.js"></script>
<script>
  // 九組顏色
  const GROUP_COLORS = [
    "#ef4444","#f59e0b","#22c55e","#3b82f6","#8b5cf6",
    "#ec4899","#14b8a6","#f97316","#6366f1"
  ];

  const METRIC_INFO = {
    temp:      { label: "空氣溫度", unit: "°C", icon: "🌡️" },
    humi:      { label: "空氣濕度", unit: "%",  icon: "💧" },
    soil:      { label: "土壤濕度", unit: "",   icon: "🌱" },
    soil_temp: { label: "土壤溫度", unit: "°C", icon: "🌡️" }
  };

  let curMetric   = "temp";
  let curRange    = "today";
  let checkedGroups = new Set([1,2,3,4,5,6,7,8,9]);
  let overviewData  = [];
  let historyCache  = {};
  let compareChart  = null;

  // ── 初始化組別勾選 ──
  function initGroupChecks() {
    const wrap = document.getElementById("groupChecks");
    wrap.innerHTML = Array.from({length:9},(_,i)=>{
      const g = i+1;
      const c = GROUP_COLORS[i];
      return `
        <label class="group-check checked" id="gc_${g}" style="background:${c}">
          <input type="checkbox" checked style="display:none"
            onchange="toggleGroup(${g},this)">
          <span class="color-dot" style="background:white;opacity:0.7"></span>
          ${CONFIG.GROUP_NAMES[g]}
        </label>`;
    }).join("");
  }

  function toggleGroup(g, el) {
    const label = document.getElementById("gc_" + g);
    if (el.checked) {
      checkedGroups.add(g);
      label.classList.add("checked");
      label.style.background = GROUP_COLORS[g-1];
      label.style.color = "white";
    } else {
      checkedGroups.delete(g);
      label.classList.remove("checked");
      label.style.background = "white";
      label.style.color = "#64748b";
    }
    renderChart();
  }

  // ── 切換指標 ──
  function setMetric(m, btn) {
    curMetric = m;
    document.querySelectorAll(".metric-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderRanking();
    renderChart();
  }

  // ── 切換時間範圍 ──
  function setRange(r, btn) {
    curRange = r;
    document.querySelectorAll(".range-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    historyCache = {};
    loadHistory();
  }

  // ── 渲染排行榜（使用 overview 最新值） ──
  function renderRanking() {
    if (!overviewData.length) return;
    const info = METRIC_INFO[curMetric];
    const sorted = [...overviewData]
      .filter(d => d[curMetric] !== undefined)
      .sort((a,b) => b[curMetric] - a[curMetric]);

    const maxVal = sorted[0]?.[curMetric] || 1;

    const rankHtml = (title, data) => `
      <div class="ranking-card">
        <div class="ranking-title">${title}</div>
        ${data.map((d,i) => {
          const pct = Math.round((d[curMetric]/maxVal)*100);
          const rankClass = i===0?"rank-1":i===1?"rank-2":i===2?"rank-3":"rank-n";
          const st = getValueStatus(curMetric, d[curMetric]);
          const stColor = st==="danger"?"#ef4444":st==="warning"?"#f59e0b":"#22c55e";
          return `
            <div class="rank-item">
              <div class="rank-num ${rankClass}">${i+1}</div>
              <div class="rank-name">${CONFIG.GROUP_NAMES[d.group_id]}</div>
              <div class="rank-bar-wrap">
                <div class="rank-bar" style="width:${pct}%;background:${GROUP_COLORS[d.group_id-1]}"></div>
              </div>
              <div class="rank-value" style="color:${stColor}">
                ${d[curMetric]}${info.unit}
              </div>
            </div>`;
        }).join("")}
      </div>`;

    document.getElementById("rankingGrid").innerHTML =
      rankHtml(`${info.icon} ${info.label} 由高到低`, sorted) +
      rankHtml(`${info.icon} ${info.label} 由低到高`, [...sorted].reverse());
  }

  // ── 渲染折線圖 ──
  function renderChart() {
    const info = METRIC_INFO[curMetric];
    document.getElementById("chartTitle").textContent =
      `📈 各組 ${info.label} 比較`;

    const datasets = [];
    for (let g = 1; g <= 9; g++) {
      if (!checkedGroups.has(g)) continue;
      const hist = historyCache[g] || [];
      datasets.push({
        label: CONFIG.GROUP_NAMES[g],
        data: hist.map(d => ({ x: new Date(d.timestamp), y: d[curMetric] })),
        borderColor: GROUP_COLORS[g-1],
        backgroundColor: "transparent",
        borderWidth: 2,
        pointRadius: hist.length > 50 ? 0 : 3,
        tension: 0.3
      });
    }

    if (compareChart) compareChart.destroy();
    const canvas = document.getElementById("compareChart");
    compareChart = new Chart(canvas, {
      type: "line",
      data: { datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: "top", labels: { boxWidth: 12, font: { size: 11 } } },
          tooltip: { mode: "index", intersect: false }
        },
        scales: {
          x: {
            type: "time",
            time: { tooltipFormat: "MM/dd HH:mm", displayFormats: { hour:"HH:mm", day:"MM/dd" } },
            ticks: { maxTicksLimit: 10, font: { size: 11 } },
            grid: { display: false }
          },
          y: {
            title: { display: true, text: `${info.label} (${info.unit})`, font: { size: 11 } },
            ticks: { font: { size: 11 } },
            grid: { color: "#f1f5f9" }
          }
        }
      }
    });
  }

  // ── 載入 overview ──
  async function loadOverview() {
    try {
      const res  = await fetch(CONFIG.GAS_URL + "?action=read_overview");
      const json = await res.json();
      if (json.status === "OK") {
        overviewData = json.data;
        renderRanking();
      }
    } catch(e) { console.error(e); }
  }

  // ── 載入所有組別歷史 ──
  async function loadHistory() {
    const promises = Array.from({length:9},(_,i)=>{
      const g = i+1;
      return fetch(CONFIG.GAS_URL + `?action=read_group&group_id=${g}&range=${curRange}`)
        .then(r => r.json())
        .then(json => {
          if (json.status === "OK") historyCache[g] = json.data;
        })
        .catch(()=>{});
    });
    await Promise.all(promises);
    renderChart();
  }

  async function loadAll() {
    await loadOverview();
    await loadHistory();
  }

  initGroupChecks();
  loadAll();
  setInterval(loadAll, CONFIG.REFRESH_INTERVAL);
</script>
</body>
</html>
